<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --bg2:       #111418;
      --bg3:       #181c22;
      --border:    #252a33;
      --accent:    #00e5a0;
      --accent2:   #0099ff;
      --error:     #ff4455;
      --warn:      #ffaa00;
      --text:      #c8d0dc;
      --text-dim:  #5a6478;
      --text-hi:   #eef2f8;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span { color: var(--text-dim); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .refresh-info {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    #countdown {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 0.75rem 2rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-hi);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .dot.ok     { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.error  { background: var(--error);  box-shadow: 0 0 6px var(--error);  }
    .dot.pulse  { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 0.25rem;
    }

    input[type="date"], input[type="number"], select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 0.4rem 0.65rem;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus { border-color: var(--accent); }

    input[type="number"] { width: 80px; }

    .btn {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { filter: brightness(1.1); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-dl {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--accent2);
    }
    .btn-dl:hover { border-color: var(--accent2); }

    .sep { width: 1px; height: 24px; background: var(--border); }

    /* ── TABLE WRAPPER ── */
    .table-wrap {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: auto;
      position: relative;
    }

    .table-wrap.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10,12,15,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 12px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg3);
    }

    th {
      padding: 0.65rem 1rem;
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 500;
    }

    td {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--bg3); }

    tbody tr.new-row {
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { background: rgba(0,229,160,0.08); }
      to   { background: transparent; }
    }

    td.numeric { color: var(--accent); text-align: right; }
    td.ts      { color: var(--text-dim); }
    td.device  { color: var(--accent2); }

    /* ── EMPTY / ERROR STATES ── */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
    }

    .empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; }

    /* ── FOOTER ── */
    footer {
      padding: 0.75rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    #row-count { color: var(--text); font-weight: 600; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.6rem 1rem;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-hi);
      border-radius: 4px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.error-toast { border-left-color: var(--error); }
  </style>
</head>
<body>

<header>
  <div class="logo">Weather<span>/</span>Station</div>
  <div class="header-right">
    <span class="refresh-info">auto-refresh <span id="countdown">30</span>s</span>
    <button class="btn btn-primary" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="status-bar">
  <div class="stat">
    <div class="dot pulse" id="status-dot"></div>
    <span class="stat-label">Server</span>
    <span class="stat-value" id="status-text">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Último dato</span>
    <span class="stat-value" id="last-received">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Total registros</span>
    <span class="stat-value" id="total-records">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Dispositivo</span>
    <span class="stat-value" id="last-device">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">UTC</span>
    <span class="stat-value" id="server-time">—</span>
  </div>
</div>

<main>
  <div class="toolbar">
    <span class="toolbar-label">Desde</span>
    <input type="date" id="filter-desde">
    <span class="toolbar-label">Hasta</span>
    <input type="date" id="filter-hasta">
    <span class="toolbar-label">Límite</span>
    <input type="number" id="filter-limit" value="100" min="1" max="5000">
    <button class="btn btn-outline" onclick="loadData()">Filtrar</button>
    <button class="btn btn-outline" onclick="clearFilters()">Limpiar</button>
    <div class="sep"></div>
    <button class="btn btn-dl" onclick="download('csv')">↓ CSV</button>
    <button class="btn btn-dl" onclick="download('json')">↓ JSON</button>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="empty-state">
      <div class="icon">◌</div>
      Cargando datos...
    </div>
  </div>
</main>

<footer>
  <span>weather-station · <span id="row-count">0</span> registros visibles</span>
  <span id="last-fetch">—</span>
</footer>

<div id="toast"></div>

<script>
  const API = '';  // mismo origen, sin prefijo
  let allColumns = [];
  let refreshTimer;
  let countdown = 30;

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    setTodayAsDefault();
    loadData();
    startCountdown();
  });

  function setTodayAsDefault() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filter-hasta').value = today;
  }

  // ── COUNTDOWN ──
  function startCountdown() {
    clearInterval(refreshTimer);
    countdown = 30;
    refreshTimer = setInterval(() => {
      countdown--;
      document.getElementById('countdown').textContent = countdown;
      if (countdown <= 0) {
        loadData();
        countdown = 30;
      }
    }, 1000);
  }

  // ── LOAD DATA ──
  async function loadData() {
    countdown = 30;
    document.getElementById('countdown').textContent = countdown;

    // health check
    try {
      const h = await fetch(`${API}/health`).then(r => r.json());
      setStatus('ok', h);
    } catch(e) {
      setStatus('error', null);
    }

    // table data
    const desde = document.getElementById('filter-desde').value;
    const hasta  = document.getElementById('filter-hasta').value;
    const limit  = document.getElementById('filter-limit').value;

    let url = `${API}/weather/range?limit=${limit}`;
    if (desde) url += `&desde=${desde}`;
    if (hasta)  url += `&hasta=${hasta}`;

    try {
      const res  = await fetch(url);
      const json = await res.json();
      renderTable(json.data || []);
      document.getElementById('row-count').textContent = (json.data || []).length;
      document.getElementById('last-fetch').textContent =
        'Última consulta: ' + new Date().toLocaleTimeString();
    } catch(e) {
      showTableError();
    }
  }

  // ── STATUS ──
  function setStatus(state, data) {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');

    if (state === 'ok') {
      dot.className  = 'dot ok pulse';
      text.textContent = 'OK';
      text.style.color = 'var(--accent)';
      if (data) {
        document.getElementById('last-received').textContent =
          data.ultimo_registro || '—';
        document.getElementById('total-records').textContent =
          data.db_total_registros ?? '—';
        document.getElementById('server-time').textContent =
          data.server_time_utc?.split('.')[0] || '—';
      }
    } else {
      dot.className  = 'dot error pulse';
      text.textContent = 'ERROR';
      text.style.color = 'var(--error)';
    }
  }

  // ── RENDER TABLE ──
  function renderTable(rows) {
    const wrap = document.getElementById('table-wrap');

    if (!rows || rows.length === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="icon">◌</div>
          Sin datos para el período seleccionado
        </div>`;
      return;
    }

    // Detectar columnas dinámicamente
    const colSet = new Set();
    rows.forEach(r => Object.keys(r).forEach(k => colSet.add(k)));
    const cols = Array.from(colSet);

    // Pinned columns primero
    const pinned  = ['id', 'received_at'];
    const rest    = cols.filter(c => !pinned.includes(c));
    const ordered = [...pinned, ...rest];

    // Actualizar device en status bar con el último registro
    const last = rows[0];
    if (last) {
      const dev = last.DeviceID || last.device_id || '—';
      document.getElementById('last-device').textContent = dev;
    }

    const thead = `<thead><tr>${
      ordered.map(c => `<th title="${c}">${c}</th>`).join('')
    }</tr></thead>`;

    const tbody = `<tbody>${
      rows.map((row, i) => {
        const cells = ordered.map(col => {
          const val = row[col] ?? '';
          const cls = col === 'received_at' || col === 'Timestamp'
            ? 'ts'
            : col === 'DeviceID' || col === 'DeviceType'
            ? 'device'
            : !isNaN(val) && val !== '' ? 'numeric' : '';
          return `<td class="${cls}" title="${val}">${val}</td>`;
        }).join('');
        return `<tr class="${i === 0 ? 'new-row' : ''}">${cells}</tr>`;
      }).join('')
    }</tbody>`;

    wrap.innerHTML = `<table>${thead}${tbody}</table>`;
  }

  function showTableError() {
    document.getElementById('table-wrap').innerHTML = `
      <div class="empty-state">
        <div class="icon">✕</div>
        Error al obtener datos del servidor
      </div>`;
  }

  // ── FILTERS ──
  function clearFilters() {
    document.getElementById('filter-desde').value = '';
    setTodayAsDefault();
    document.getElementById('filter-limit').value = 100;
    loadData();
  }

  // ── DOWNLOAD ──
  function download(format) {
    const desde = document.getElementById('filter-desde').value;
    const hasta  = document.getElementById('filter-hasta').value;
    const limit  = document.getElementById('filter-limit').value;

    let url = `${API}/weather/export/${format}?limit=${limit}`;
    if (desde) url += `&desde=${desde}`;
    if (hasta)  url += `&hasta=${hasta}`;

    window.location.href = url;
    toast(`Descargando ${format.toUpperCase()}...`);
  }

  // ── TOAST ──
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show' + (isError ? ' error-toast' : '');
    setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
